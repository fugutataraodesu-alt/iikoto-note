<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>今日のいいこと帳</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--cream:#FDF8F2;--wp:#FFFBF6;--pp:#FDE8EF;--pm:#F4A7C0;--pd:#D4537E;--tl:#E6F6F2;--tm:#7ECFC0;--td:#2A9D8F;--al:#FEF3E2;--am:#EF9F27;--tm2:#3A2E2E;--ts:#7A6060;--th:#B09090;--bp:rgba(212,83,126,0.15);--bt:rgba(42,157,143,0.18)}
body{background:var(--cream);color:var(--tm2);font-family:sans-serif;min-height:100vh}
header{background:var(--wp);border-bottom:1px solid var(--bp);padding:1rem 1.5rem;text-align:center;position:sticky;top:0;z-index:10}
header p{font-size:11px;color:var(--pd);margin-bottom:4px}
header h1{font-size:20px;font-weight:700}
header small{font-size:12px;color:var(--ts)}
main{max-width:600px;margin:0 auto;padding:1.5rem 1rem 6rem}
.card{border-radius:16px;padding:1rem 1.25rem;margin-bottom:1rem}
.card.p{background:var(--wp);border:1px solid var(--bp)}
.card.t{background:#FAFFFE;border:1px solid var(--bt)}
.card b{display:block;font-size:12px;margin-bottom:8px}
.card.p b{color:var(--pd)}
.card.t b{color:var(--td)}
textarea{width:100%;border:none;border-radius:10px;padding:10px 12px;font-family:inherit;font-size:15px;line-height:1.6;resize:none;min-height:46px;max-height:120px;outline:none}
.card.p textarea{background:var(--cream)}
.card.t textarea{background:#F0FAFA}
button.rec{width:100%;margin-top:10px;padding:14px;border-radius:10px;border:none;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;color:#fff}
button.rec.p{background:var(--pd)}
button.rec.t{background:var(--td)}
.tabs{display:flex;gap:6px;margin-bottom:1rem}
.tab{flex:1;padding:10px 0;border:1px solid var(--bp);border-radius:10px;background:transparent;font-family:inherit;font-size:14px;color:var(--ts);cursor:pointer;font-weight:500}
.tab.on{background:var(--pd);border-color:var(--pd);color:#fff}
.list{display:flex;flex-direction:column;gap:8px}
.item{border-radius:14px;padding:.85rem 1rem;display:flex;align-items:flex-start;gap:10px}
.item.g{background:var(--wp);border:1px solid var(--bp)}
.item.n{background:var(--wp);border:1px solid var(--bt)}
.dot{width:8px;height:8px;border-radius:50%;margin-top:7px;flex-shrink:0}
.item.g .dot{background:var(--pm)}
.item.n .dot{background:var(--tm)}
.ib{flex:1}
.tag{display:inline-block;font-size:10px;font-weight:700;padding:1px 7px;border-radius:20px;margin-bottom:4px}
.item.g .tag{background:var(--pp);color:var(--pd)}
.item.n .tag{background:var(--tl);color:var(--td)}
.it{font-size:15px;line-height:1.65}
.im{font-size:11px;color:var(--th);margin-top:4px}
.acts{display:flex;flex-direction:column;align-items:center;gap:2px;flex-shrink:0}
.del,.ed{background:none;border:none;cursor:pointer;color:var(--th);padding:4px 6px}
.del{font-size:18px}.ed{font-size:15px}
.edit-area{width:100%;border:1px solid var(--pm);border-radius:8px;padding:8px 10px;font-family:inherit;font-size:15px;line-height:1.6;resize:none;min-height:60px;max-height:200px;outline:none;background:var(--cream);margin-top:4px}
.item.n .edit-area{background:#F0FAFA;border-color:var(--tm)}
.edit-btns{display:flex;gap:6px;margin-top:6px}
.esv{flex:1;padding:7px;border-radius:8px;border:none;background:var(--pd);color:#fff;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer}
.ecl{flex:1;padding:7px;border-radius:8px;border:1px solid var(--th);background:transparent;color:var(--ts);font-family:inherit;font-size:13px;cursor:pointer}
.empty{text-align:center;padding:2.5rem 1rem;color:var(--th);font-size:14px;line-height:2}
.stats{background:var(--al);border:1px solid rgba(239,159,39,.2);border-radius:12px;padding:.75rem 1rem;margin-bottom:1rem;display:flex;align-items:center;gap:12px}
.st{text-align:center;flex:1}
.sn{font-size:20px;font-weight:700;color:var(--am);line-height:1}
.sl{font-size:10px;color:var(--ts);margin-top:2px}
.sd{width:1px;height:32px;background:rgba(239,159,39,.25)}
.cs{margin-top:1.5rem;background:var(--wp);border:1px solid var(--bp);border-radius:14px;padding:1rem 1.25rem}
.cs p{font-size:12px;color:var(--ts);margin-bottom:10px;line-height:1.6}
.cp{width:100%;padding:12px;border-radius:10px;border:1.5px solid var(--pd);background:transparent;color:var(--pd);font-family:inherit;font-size:14px;font-weight:700;cursor:pointer}
.cp.ok{background:#3B6D11;border-color:#3B6D11;color:#fff}
.dg{margin-bottom:1.25rem}
.dl{font-size:11px;font-weight:700;color:var(--pd);margin-bottom:6px;padding-left:4px}
</style>
</head>
<body>
<header>
<p>自己肯定感トレーニング</p>
<h1>今日のいいこと帳</h1>
<small id="hd"></small>
</header>
<main>
<div class="card p">
<b>🌸 今日、楽しかったこと・よかったこと</b>
<textarea id="ig" placeholder="どんな小さなことでもOK。コーヒーがおいしかった、でも◎" rows="1"></textarea>
<button class="rec p" id="bg">記録する</button>
</div>
<div class="card t">
<b>🌱 気づき・次にやってみたいこと <span style="font-size:11px;font-weight:400;color:var(--th)">（任意）</span></b>
<textarea id="in2" placeholder="次回はもっと○○したい…など" rows="1"></textarea>
<button class="rec t" id="bn">記録する</button>
</div>
<div class="tabs">
<button class="tab on" id="tt" onclick="sw(0)">今日</button>
<button class="tab" id="ta" onclick="sw(1)">全履歴</button>
</div>
<div id="vt">
<div id="sb" class="stats" style="display:none">
<div class="st"><div class="sn" id="s0">0</div><div class="sl">今日の記録</div></div>
<div class="sd"></div>
<div class="st"><div class="sn" id="s1">0</div><div class="sl">累計記録</div></div>
<div class="sd"></div>
<div class="st"><div class="sn" id="s2">0</div><div class="sl">継続日数</div></div>
</div>
<div id="lt" class="list"></div>
<div id="et" class="empty">🌸<br>今日のいいことを書いてみよう。</div>
<div id="ct" class="cs" style="display:none">
<p>CSVをダウンロードして、Claudeのチャットに添付するだけで分析を依頼できます。</p>
<button class="cp" onclick="dl()">📥 CSVをダウンロード</button>
</div>
</div>
<div id="va" style="display:none">
<div id="la2" class="list"></div>
<div id="ea" class="empty">📖<br>まだ記録がありません。</div>
</div>
</main>
<script>
function tk(){return new Date().toISOString().slice(0,10);}
function fdt(k){var p=k.split("-");return p[0]+"."+p[1]+"."+p[2];}
function fd(k){var p=k.split("-");var dt=new Date(+p[0],+p[1]-1,+p[2]);var days=["日","月","火","水","木","金","土"];return p[0]+"年"+p[1]+"月"+p[2]+"日（"+days[dt.getDay()]+"）";}
function ts(){return new Date().toLocaleTimeString("ja-JP",{hour:"2-digit",minute:"2-digit"});}
function eh(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
async function la(){try{var r=await fetch('/api/data');return await r.json()||{};}catch(e){return{};}}
async function sa(d){var r=await fetch('/api/data',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(d)});if(!r.ok)throw new Error('HTTP '+r.status);}
function ct2(all){var t=0;var ks=Object.keys(all);for(var i=0;i<ks.length;i++)t+=all[ks[i]].length;return t;}
async function ae(type,text){var all=await la();var k=tk();if(!all[k])all[k]=[];all[k].push({type:type,text:text,time:ts(),date:fdt(k)});await sa(all);await render();}
async function de(dk,idx){var all=await la();if(all[dk]){all[dk].splice(idx,1);if(all[dk].length===0)delete all[dk];}await sa(all);await render();}
async function ee(dk,idx,newText){var all=await la();if(all[dk]&&all[dk][idx])all[dk][idx].text=newText;await sa(all);await render();}
function be(e,dk,idx){var isN=e.type==="next";var div=document.createElement("div");div.className="item "+(isN?"n":"g");var dateStr=e.date||fdt(dk);div.innerHTML="<div class=\"dot\"></div><div class=\"ib\"><span class=\"tag\">"+(isN?"🌱 気づき・次にやりたいこと":"🌸 よかったこと")+"</span><div class=\"it\">"+eh(e.text)+"</div><div class=\"im\">"+dateStr+" "+e.time+"</div></div><div class=\"acts\"><button class=\"ed\" aria-label=\"修正\">✏</button><button class=\"del\" aria-label=\"削除\">×</button></div>";(function(d,i,eo){div.querySelector(".del").addEventListener("click",function(){de(d,i);});div.querySelector(".ed").addEventListener("click",function(){var ib=div.querySelector(".ib");var itDiv=div.querySelector(".it");var acts=div.querySelector(".acts");var ta=document.createElement("textarea");ta.className="edit-area";ta.value=eo.text;var btns=document.createElement("div");btns.className="edit-btns";var sv=document.createElement("button");sv.className="esv";sv.textContent="保存";var cl=document.createElement("button");cl.className="ecl";cl.textContent="キャンセル";btns.appendChild(sv);btns.appendChild(cl);itDiv.replaceWith(ta);acts.style.display="none";ib.appendChild(btns);ta.style.height=Math.min(ta.scrollHeight,200)+"px";ta.focus();ta.addEventListener("input",function(){ta.style.height="auto";ta.style.height=Math.min(ta.scrollHeight,200)+"px";});sv.addEventListener("click",async function(){var t=ta.value.trim();if(!t)return;sv.textContent="保存中…";sv.disabled=true;await ee(d,i,t);});cl.addEventListener("click",function(){var ni=document.createElement("div");ni.className="it";ni.innerHTML=eh(eo.text);ta.replaceWith(ni);btns.remove();acts.style.display="";});});})(dk,idx,e);return div;}
async function render(){var all=await la();var today=tk();var te=all[today]||[];var tot=ct2(all);var days=Object.keys(all).length;document.getElementById("hd").textContent=fd(today);var sb=document.getElementById("sb");if(tot>0){sb.style.display="flex";document.getElementById("s0").textContent=te.length;document.getElementById("s1").textContent=tot;document.getElementById("s2").textContent=days;}else{sb.style.display="none";}var lt=document.getElementById("lt");var et=document.getElementById("et");var ct3=document.getElementById("ct");lt.innerHTML="";if(te.length===0){et.style.display="block";ct3.style.display="none";}else{et.style.display="none";ct3.style.display=tot>=1?"block":"none";var rev=te.slice().reverse();for(var i=0;i<rev.length;i++)lt.appendChild(be(rev[i],today,te.length-1-i));}var el2=document.getElementById("la2");var ea=document.getElementById("ea");el2.innerHTML="";var ak=Object.keys(all).sort().reverse();if(ak.length===0){ea.style.display="block";}else{ea.style.display="none";for(var j=0;j<ak.length;j++){var dk=ak[j];var g=document.createElement("div");g.className="dg";g.innerHTML="<div class=\"dl\">"+fdt(dk)+" "+fd(dk)+"</div>";var ents=all[dk];var rE=ents.slice().reverse();for(var m=0;m<rE.length;m++)g.appendChild(be(rE[m],dk,ents.length-1-m));el2.appendChild(g);}}}
function sw(v){document.getElementById("tt").className="tab"+(v===0?" on":"");document.getElementById("ta").className="tab"+(v===1?" on":"");document.getElementById("vt").style.display=v===0?"block":"none";document.getElementById("va").style.display=v===1?"block":"none";}
async function dl(){var d=await la();var rows=["このいいこと帳のデータを読んで、私の傾向・強み・どんなことが私を幸せにするか分析してください。","日付,時刻,種別,内容"];var keys=Object.keys(d).sort();for(var i=0;i<keys.length;i++){var dk=keys[i];var ents=d[dk];for(var j=0;j<ents.length;j++){var e=ents[j];var kind=e.type==="next"?"気づき・次にやりたいこと":"よかったこと";var text=e.text.replace(/"/g,'""');rows.push(fdt(dk)+","+e.time+","+kind+',"'+text+'"');}}var blob=new Blob(["﻿"+rows.join("\n")],{type:"text/csv;charset=utf-8"});var url=URL.createObjectURL(blob);var a=document.createElement("a");a.href=url;a.download="iikoto_"+tk()+".csv";a.click();URL.revokeObjectURL(url);}
function si(iid,bid,type){var inp=document.getElementById(iid);var btn=document.getElementById(bid);btn.addEventListener("click",async function(){var t=inp.value.trim();if(!t)return;var orig=btn.textContent;btn.textContent="保存中…";btn.disabled=true;try{await ae(type,t);inp.value="";inp.style.height="auto";}catch(ex){alert("保存に失敗しました。\nブラウザのアドレスバーが https://iikoto-note.pages.dev になっているか確認してください。\nエラー: "+ex.message);}btn.textContent=orig;btn.disabled=false;});inp.addEventListener("input",function(){this.style.height="auto";this.style.height=Math.min(this.scrollHeight,120)+"px";});}
si("ig","bg","good");
si("in2","bn","next");
(async function(){
  try{
    var kv=await la();
    if(Object.keys(kv).length===0){
      var ls=localStorage.getItem("iikoto_v2");
      if(ls){var parsed=JSON.parse(ls);if(Object.keys(parsed).length>0)await sa(parsed);}
    }
  }catch(e){}
  await render();
})();
</script>
</body>
</html>
